<html lang="tr">

    body {
      margin: 0;
      background: black;
      color: lime;
      font-family: monospace;
      text-align: center;
    }

    h1 {
      margin-top: 80px;
      font-size: 40px;
      text-shadow: 0 0 10px lime;
    }

    p {
      font-size: 18px;

    button {

      padding: 10px 20px;

    }

    button:hover {
      background: white;
    }

</html>
